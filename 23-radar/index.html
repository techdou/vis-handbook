<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>23 · 雷达图 Radar Chart</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono&family=Noto+Serif+SC:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --paper: #faf9f6; --paper-soft: #f3f1ea; --paper-card: #ffffff;
      --ink: #1a1a1a; --ink-2: #3d3d3d; --ink-3: #6b6b6b;
      --rule: #d8d4c8; --accent: #2c5282; --rust: #9c4221; --ochre: #975a16; --moss: #4a6741;
      --serif: "Source Serif 4", "Noto Serif SC", Georgia, serif;
      --sans: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    body { background: var(--paper); color: var(--ink); font-family: var(--serif); padding: 24px 32px; min-height: 100vh; }
    h1 { font-family: var(--serif); font-size: 26px; font-weight: 500; letter-spacing: -0.01em; }
    h1 em { font-style: italic; color: var(--accent); font-weight: 400; }
    .sub { font-family: var(--sans); color: var(--ink-3); font-size: 13px; margin: 6px 0 18px; line-height: 1.5; }
    #chart { width: 100%; height: calc(100vh - 160px); min-height: 500px; border: 1px solid var(--rule); border-radius: 2px; background: var(--paper); }
    .controls { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; align-items: center; }
    .controls button { font-family: var(--sans); background: var(--paper); border: 1px solid var(--rule); color: var(--ink-2); padding: 6px 14px; border-radius: 2px; cursor: pointer; font-size: 12px; transition: all .15s; }
    .controls button:hover { color: var(--accent); border-color: var(--accent); }
    .controls button.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }
    @media (max-width: 768px) {
      body { padding: 16px 14px; }
      h1 { font-size: 22px; }
      .sub { font-size: 12px; margin-bottom: 12px; }
      .controls { gap: 4px; }
      .controls button { padding: 5px 10px; font-size: 11px; }
      #chart { height: calc(100vh - 160px) !important; min-height: 380px !important; }
    }
    @media (max-width: 420px) { body { padding: 12px 10px; } h1 { font-size: 20px; } #chart { height: calc(100vh - 150px) !important; min-height: 340px !important; } }
  </style>
</head>
<body>
  <h1>雷达图 <em>Radar / Spider Chart</em></h1>
  <div class="sub">多维对比 · 放射状轴 · 多边形面积=综合能力</div>
  <div class="controls">
    <button class="active" data-set="phone">📱 手机测评</button>
    <button data-set="hero">⚔️ 游戏角色</button>
    <button data-set="employee">👔 员工能力</button>
  </div>
  <div id="chart"></div>

  <script>
    const chart = echarts.init(document.getElementById('chart'));
    const palette = ['#2c5282', '#9c4221', '#975a16', '#4a6741', '#6b5d8a'];

    const DATASETS = {
      phone: {
        title: '四款手机综合测评 (0-100)',
        indicators: [
          { name: '性能', max: 100 }, { name: '续航', max: 100 }, { name: '拍照', max: 100 },
          { name: '屏幕', max: 100 }, { name: '价格', max: 100 }, { name: '外观', max: 100 }
        ],
        data: [
          { name: '旗舰 A', values: [95, 70, 92, 96, 55, 88] },
          { name: '旗舰 B', values: [88, 85, 80, 90, 60, 92] },
          { name: '性价比 C', values: [75, 88, 70, 78, 95, 75] },
        ]
      },
      hero: {
        title: 'RPG 角色属性面板',
        indicators: [
          { name: '攻击', max: 100 }, { name: '防御', max: 100 }, { name: '速度', max: 100 },
          { name: '生命', max: 100 }, { name: '魔法', max: 100 }, { name: '暴击', max: 100 }
        ],
        data: [
          { name: '战士', values: [90, 95, 50, 95, 20, 60] },
          { name: '法师', values: [70, 35, 65, 50, 98, 85] },
          { name: '盗贼', values: [80, 50, 95, 60, 40, 92] },
        ]
      },
      employee: {
        title: '员工能力评估',
        indicators: [
          { name: '专业技能', max: 100 }, { name: '沟通能力', max: 100 }, { name: '领导力', max: 100 },
          { name: '执行力', max: 100 }, { name: '创新力', max: 100 }, { name: '团队协作', max: 100 },
          { name: '学习能力', max: 100 }
        ],
        data: [
          { name: '张三(资深)', values: [92, 85, 88, 90, 75, 88, 82] },
          { name: '李四(中级)', values: [78, 72, 55, 85, 80, 75, 88] },
        ]
      }
    };

    function render(key) {
      const d = DATASETS[key];
      chart.setOption({
        backgroundColor: 'transparent',
        title: { text: d.title, left: 'center', textStyle: { fontFamily: 'Source Serif 4, serif', fontSize: 14, color: '#6b6b6b', fontWeight: 400 } },
        tooltip: { trigger: 'item' },
        legend: { bottom: 10, textStyle: { color: '#3d3d3d', fontFamily: 'sans-serif' } },
        radar: {
          indicator: d.indicators,
          center: ['50%', '52%'],
          radius: '62%',
          axisName: { color: '#3d3d3d', fontFamily: 'sans-serif', fontSize: 12 },
          splitLine: { lineStyle: { color: '#e8e4d8' } },
          splitArea: { areaStyle: { color: ['rgba(243,241,234,0.4)', 'rgba(255,255,255,0)'] } },
          axisLine: { lineStyle: { color: '#d8d4c8' } }
        },
        series: [{
          type: 'radar',
          data: d.data.map((item, i) => ({
            value: item.values,
            name: item.name,
            areaStyle: { color: palette[i % palette.length], opacity: 0.15 },
            lineStyle: { color: palette[i % palette.length], width: 2 },
            itemStyle: { color: palette[i % palette.length] }
          })),
          emphasis: { lineStyle: { width: 3 }, areaStyle: { opacity: 0.3 } },
          animationDuration: 1200
        }]
      }, true);
    }

    render('phone');
    document.querySelectorAll('.controls button').forEach(btn => {
      btn.onclick = () => {
        document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active'); render(btn.dataset.set);
      };
    });
    window.addEventListener('resize', () => chart.resize());
  </script>
</body>
</html>
