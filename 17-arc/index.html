<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>17 · 弧图 Arc Diagram</title>
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono&family=Noto+Serif+SC:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --paper: #faf9f6; --paper-soft: #f3f1ea; --paper-card: #ffffff;
      --ink: #1a1a1a; --ink-2: #3d3d3d; --ink-3: #6b6b6b;
      --rule: #d8d4c8; --rule-soft: #e8e4d8; --accent: #2c5282; --accent-soft: #ebf0f7;
      --rust: #9c4221; --ochre: #975a16; --moss: #4a6741;
      --serif: "Source Serif 4", "Noto Serif SC", Georgia, serif;
      --sans: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      --mono: "JetBrains Mono", Consolas, monospace;
    }
    body { background: var(--paper); color: var(--ink);
      font-family: var(--serif); padding: 24px 32px; min-height: 100vh; }
    h1 { font-family: var(--serif); font-size: 26px; font-weight: 500; letter-spacing: -0.01em; }
    h1 em { font-style: italic; color: var(--accent); font-weight: 400; }
    .sub { font-family: var(--sans); color: var(--ink-3); font-size: 13px; margin: 6px 0 18px; line-height: 1.5; }
    .hint, .info, .mapping { font-family: var(--sans); font-size: 12px; color: var(--ink-3); margin-top: 10px; line-height: 1.6; }
    .hint code, .mapping code { font-family: var(--mono); background: var(--paper-soft); padding: 1px 6px; border-radius: 2px; color: var(--accent); font-size: 11px; }
    #chart, #cloud, #cy { border: 1px solid var(--rule); border-radius: 2px; background: var(--paper); }
    svg { display: block; width: 100%; }
    .controls { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; align-items: center; }
    .controls button, .controls select {
      font-family: var(--sans); background: var(--paper); border: 1px solid var(--rule); color: var(--ink-2);
      padding: 6px 14px; border-radius: 2px; cursor: pointer; font-size: 12px; transition: all .15s;
    }
    .controls button:hover, .controls select:hover { color: var(--accent); border-color: var(--accent); }
    .controls button.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }
    .controls label { color: var(--ink-3); font-family: var(--sans); font-size: 12px; }
    .legend { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 12px; font-family: var(--sans); font-size: 11px; color: var(--ink-2); }
    .legend span { display: inline-flex; align-items: center; gap: 6px; cursor: pointer; }
    .legend i { width: 12px; height: 12px; display: inline-block; }
    .legend .dot { border-radius: 50%; }
    .tip { position: fixed; pointer-events: none; opacity: 0;
      background: #fff; border: 1px solid var(--ink); padding: 10px 14px; border-radius: 2px;
      font-family: var(--sans); font-size: 12px; max-width: 260px; line-height: 1.6;
      transition: opacity .12s; box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
    .node-label, .face-label { font-family: var(--sans); font-size: 11px; fill: var(--ink); }
    .ridge-label { font-family: var(--sans); font-size: 12px; font-weight: 600; }
  
    /* ===== 移动端响应式 ===== */
    @media (max-width: 768px) {
      body { padding: 16px 14px; }
      h1 { font-size: 22px; }
      .sub { font-size: 12px; margin-bottom: 12px; }
      .controls { gap: 4px; }
      .controls button, .controls select { padding: 5px 10px; font-size: 11px; }
      .controls label { font-size: 11px; }
      #chart, svg, #cloud, #cy {
        height: 60vh !important;
        min-height: 360px !important;
      }
      .hint, .info, .mapping, .legend { font-size: 11px; }
      .legend { gap: 10px; }
      .node-label, .face-label, .ridge-label { font-size: 10px; }
    }
    @media (max-width: 420px) {
      body { padding: 12px 10px; }
      h1 { font-size: 20px; }
      #chart, svg, #cloud, #cy { height: 55vh !important; min-height: 320px !important; }
    }
  </style>
</head>
<body>
  <h1>弧图 <em>Arc Diagram</em></h1>
  <div class="sub">一维节点关系 · 半圆弧连接 · 弧高=距离 · 弧粗=关系强度</div>
  <div class="controls">
    <button class="active" data-set="novel">📖 小说人物共现</button>
    <button data-set="music">🎵 乐曲主题呼应</button>
    <button data-set="code">⚙️ 函数调用</button>
  </div>
  <svg id="chart"></svg>
  <div class="hint">💡 悬浮弧线高亮关系;节点大小代表连接数。</div>
  <div class="tip" id="tip"></div>

  <script>
    const svg = d3.select('#chart');

    const DATASETS = {
      novel: {
        title: '《红楼梦》人物共现关系',
        nodes: ['贾宝玉', '林黛玉', '薛宝钗', '王熙凤', '贾母', '史湘云', '贾政', '王夫人', '贾探春', '贾迎春', '妙玉', '晴雯'],
        links: [
          ['贾宝玉', '林黛玉', 30], ['贾宝玉', '薛宝钗', 25], ['贾宝玉', '王熙凤', 18],
          ['贾宝玉', '贾母', 22], ['贾宝玉', '史湘云', 12], ['贾宝玉', '晴雯', 15],
          ['林黛玉', '贾母', 14], ['林黛玉', '薛宝钗', 8], ['林黛玉', '史湘云', 6],
          ['薛宝钗', '王夫人', 10], ['薛宝钗', '贾母', 9],
          ['王熙凤', '贾母', 20], ['王熙凤', '贾政', 7], ['王熙凤', '王夫人', 12],
          ['贾母', '贾政', 16], ['贾母', '王夫人', 14],
          ['贾政', '王夫人', 18], ['贾政', '贾探春', 6],
          ['王夫人', '贾探春', 8], ['王夫人', '贾迎春', 5],
          ['史湘云', '妙玉', 3], ['晴雯', '贾探春', 4],
        ]
      },
      music: {
        title: '乐曲主题结构(主题呼应关系)',
        nodes: ['引子', '主题A', '主题B', '变奏1', '变奏2', '高潮', '再现A', '再现B', '尾声'],
        links: [
          ['引子', '主题A', 8], ['主题A', '主题B', 6], ['主题A', '变奏1', 5],
          ['主题A', '变奏2', 4], ['主题A', '再现A', 9], ['主题A', '高潮', 7],
          ['主题B', '变奏1', 4], ['主题B', '再现B', 8], ['主题B', '高潮', 5],
          ['变奏1', '变奏2', 3], ['变奏2', '高潮', 4],
          ['再现A', '尾声', 6], ['再现B', '尾声', 5], ['高潮', '尾声', 7],
        ]
      },
      code: {
        title: '函数调用关系图',
        nodes: ['main', 'init', 'loadConfig', 'connectDB', 'query', 'process', 'validate', 'transform', 'save', 'log', 'close'],
        links: [
          ['main', 'init', 5], ['main', 'process', 4], ['main', 'close', 3],
          ['init', 'loadConfig', 4], ['init', 'connectDB', 3], ['init', 'log', 2],
          ['process', 'query', 5], ['process', 'validate', 4], ['process', 'transform', 3],
          ['process', 'save', 3], ['process', 'log', 2],
          ['validate', 'log', 2], ['transform', 'log', 1], ['save', 'log', 2],
          ['query', 'log', 1], ['connectDB', 'log', 1],
        ]
      }
    };

    const palette = ['#2c5282', '#9c4221', '#975a16', '#4a6741', '#6b5d8a', '#2d7a7a', '#8a5a2b', '#3d5a80'];
    const tip = d3.select('#tip');

    function render(key) {
      const d = JSON.parse(JSON.stringify(DATASETS[key]));
      svg.selectAll('*').remove();
      const W = svg.node().clientWidth || 800;
      // 给 svg 显式高度(否则默认 150px 导致弧被裁)
      const H = Math.max(480, Math.min(680, W * 0.55));
      svg.attr('viewBox', `0 0 ${W} ${H}`).attr('height', H).attr('width', '100%');
      // 节点放在距底部 80px 处,弧向上凸,留足空间
      const cy = H - 70;
      const arcMaxHeight = cy - 50; // 弧最高点不超过 svg 顶部 50px

      // 度数
      const deg = {};
      d.nodes.forEach(n => deg[n] = 0);
      d.links.forEach(l => { deg[l[0]]++; deg[l[1]]++; });

      // 节点位置(沿 X 轴均匀,两端留白随节点数调整)
      const padX = Math.max(50, W * 0.06);
      const x = d3.scalePoint().domain(d.nodes).range([padX, W - padX]).padding(0.5);

      const g = svg.append('g');

      // 基线
      g.append('line').attr('x1', padX * 0.6).attr('x2', W - padX * 0.6).attr('y1', cy).attr('y2', cy)
        .attr('stroke', '#d8d4c8').attr('stroke-width', 1);

      // 弧:用二次贝塞尔,控制点高度按距离比例但限制在 arcMaxHeight 内
      const arcGen = (x1, x2) => {
        const dist = Math.abs(x2 - x1);
        // 弧高度 = 距离的一半,但不能超过可用空间
        const h = Math.min(dist * 0.5, arcMaxHeight);
        const mx = (x1 + x2) / 2;
        const my = cy - h;
        return `M ${x1} ${cy} Q ${mx} ${my} ${x2} ${cy}`;
      };

      const arcs = g.append('g').selectAll('path')
        .data(d.links)
        .join('path')
        .attr('d', l => arcGen(x(l[0]), x(l[1])))
        .attr('fill', 'none')
        .attr('stroke', (l, i) => palette[i % palette.length])
        .attr('stroke-width', l => Math.max(0.8, l[2] / 4))
        .attr('stroke-opacity', 0.5)
        .style('cursor', 'pointer')
        .style('transition', 'stroke-opacity .2s, stroke-width .2s');

      arcs.on('mouseenter', function(e, l) {
        d3.select(this).attr('stroke-opacity', 1).attr('stroke-width', l[2] / 3 + 1);
        arcs.filter(a => a !== l).attr('stroke-opacity', 0.1);
        tip.style('opacity', 1).html(`<b style="color:#9c4221">${l[0]} ↔ ${l[1]}</b><br/>关系强度:${l[2]}`);
      })
      .on('mousemove', e => tip.style('left', (e.clientX + 14) + 'px').style('top', (e.clientY - 30) + 'px'))
      .on('mouseleave', function() {
        arcs.attr('stroke-opacity', 0.5).attr('stroke-width', l => Math.max(0.8, l[2] / 4));
        tip.style('opacity', 0);
      });

      // 节点
      const nodes = g.append('g').selectAll('g')
        .data(d.nodes)
        .join('g')
        .attr('transform', n => `translate(${x(n)},${cy})`);

      nodes.append('circle')
        .attr('r', n => 4 + deg[n] * 1.5)
        .attr('fill', n => palette[d.nodes.indexOf(n) % palette.length])
        .attr('stroke', '#faf9f6').attr('stroke-width', 2);

      nodes.append('text')
        .attr('class', 'node-label')
        .attr('y', 22).attr('text-anchor', 'middle')
        .style('fill', '#1a1a1a')
        .text(n => n);

      // 节点 hover 高亮其所有弧
      nodes.on('mouseenter', function(e, n) {
        arcs.attr('stroke-opacity', l => (l[0] === n || l[1] === n) ? 1 : 0.08)
            .attr('stroke-width', l => (l[0] === n || l[1] === n) ? l[2] / 3 + 1.5 : Math.max(0.8, l[2] / 4));
        d3.select(this).select('circle').attr('stroke', '#fff').attr('stroke-width', 3);
        tip.style('opacity', 1).html(`<b>${n}</b><br/>连接数:${deg[n]}`);
      })
      .on('mousemove', e => tip.style('left', (e.clientX + 14) + 'px').style('top', (e.clientY - 30) + 'px'))
      .on('mouseleave', function() {
        arcs.attr('stroke-opacity', 0.5).attr('stroke-width', l => Math.max(0.8, l[2] / 4));
        d3.select(this).select('circle').attr('stroke', '#faf9f6').attr('stroke-width', 2);
        tip.style('opacity', 0);
      });

      // 标题
      svg.append('text').attr('x', W / 2).attr('y', 24).attr('text-anchor', 'middle')
        .style('fill', '#6b6b6b').style('font-size', '13px').text(d.title);
    }

    render('novel');
    document.querySelectorAll('.controls button').forEach(btn => {
      btn.onclick = () => {
        document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active'); render(btn.dataset.set);
      };
    });
    window.addEventListener('resize', () => {
      const active = document.querySelector('.controls button.active');
      if (active) render(active.dataset.set);
    });
  </script>
</body>
</html>
