<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>18 · 蜂群图 Beeswarm</title>
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono&family=Noto+Serif+SC:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --paper: #faf9f6; --paper-soft: #f3f1ea; --paper-card: #ffffff;
      --ink: #1a1a1a; --ink-2: #3d3d3d; --ink-3: #6b6b6b;
      --rule: #d8d4c8; --rule-soft: #e8e4d8; --accent: #2c5282; --accent-soft: #ebf0f7;
      --rust: #9c4221; --ochre: #975a16; --moss: #4a6741;
      --serif: "Source Serif 4", "Noto Serif SC", Georgia, serif;
      --sans: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      --mono: "JetBrains Mono", Consolas, monospace;
    }
    body { background: var(--paper); color: var(--ink);
      font-family: var(--serif); padding: 24px 32px; min-height: 100vh; }
    h1 { font-family: var(--serif); font-size: 26px; font-weight: 500; letter-spacing: -0.01em; }
    h1 em { font-style: italic; color: var(--accent); font-weight: 400; }
    .sub { font-family: var(--sans); color: var(--ink-3); font-size: 13px; margin: 6px 0 18px; line-height: 1.5; }
    .hint, .info, .mapping { font-family: var(--sans); font-size: 12px; color: var(--ink-3); margin-top: 10px; line-height: 1.6; }
    .hint code, .mapping code { font-family: var(--mono); background: var(--paper-soft); padding: 1px 6px; border-radius: 2px; color: var(--accent); font-size: 11px; }
    #chart, #cloud, #cy { border: 1px solid var(--rule); border-radius: 2px; background: var(--paper); }
    svg { display: block; width: 100%; }
    .controls { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; align-items: center; }
    .controls button, .controls select {
      font-family: var(--sans); background: var(--paper); border: 1px solid var(--rule); color: var(--ink-2);
      padding: 6px 14px; border-radius: 2px; cursor: pointer; font-size: 12px; transition: all .15s;
    }
    .controls button:hover, .controls select:hover { color: var(--accent); border-color: var(--accent); }
    .controls button.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }
    .controls label { color: var(--ink-3); font-family: var(--sans); font-size: 12px; }
    .legend { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 12px; font-family: var(--sans); font-size: 11px; color: var(--ink-2); }
    .legend span { display: inline-flex; align-items: center; gap: 6px; cursor: pointer; }
    .legend i { width: 12px; height: 12px; display: inline-block; }
    .legend .dot { border-radius: 50%; }
    .tip { position: fixed; pointer-events: none; opacity: 0;
      background: #fff; border: 1px solid var(--ink); padding: 10px 14px; border-radius: 2px;
      font-family: var(--sans); font-size: 12px; max-width: 260px; line-height: 1.6;
      transition: opacity .12s; box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
    .node-label, .face-label { font-family: var(--sans); font-size: 11px; fill: var(--ink); }
    .ridge-label { font-family: var(--sans); font-size: 12px; font-weight: 600; }
  
    /* ===== 移动端响应式 ===== */
    @media (max-width: 768px) {
      body { padding: 16px 14px; }
      h1 { font-size: 22px; }
      .sub { font-size: 12px; margin-bottom: 12px; }
      .controls { gap: 4px; }
      .controls button, .controls select { padding: 5px 10px; font-size: 11px; }
      .controls label { font-size: 11px; }
      #chart, svg, #cloud, #cy {
        height: 60vh !important;
        min-height: 360px !important;
      }
      .hint, .info, .mapping, .legend { font-size: 11px; }
      .legend { gap: 10px; }
      .node-label, .face-label, .ridge-label { font-size: 10px; }
    }
    @media (max-width: 420px) {
      body { padding: 12px 10px; }
      h1 { font-size: 20px; }
      #chart, svg, #cloud, #cy { height: 55vh !important; min-height: 320px !important; }
    }
  </style>
</head>
<body>
  <h1>蜂群图 <em>Beeswarm Plot</em></h1>
  <div class="sub">一维散点不重叠 · 既能看分布又能看到每个观测 · 比 violin 更直观</div>
  <div class="controls">
    <button class="active" data-set="patient">🏥 患者指标</button>
    <button data-set="product">📱 产品评分</button>
    <button data-set="city">🌆 城市对比</button>
    <label>点大小:</label>
    <input type="range" id="psize" min="3" max="12" value="6" />
  </div>
  <svg id="chart"></svg>
  <div class="legend" id="legend"></div>
  <div class="tip" id="tip"></div>

  <script>
    const svg = d3.select('#chart');
    const palette = ['#2c5282', '#9c4221', '#975a16', '#4a6741', '#6b5d8a', '#2d7a7a', '#8a5a2b', '#3d5a80'];
    const tip = d3.select('#tip');

    function randn(mu, sigma, n) {
      const out = [];
      for (let i = 0; i < n; i++) {
        const u1 = Math.random(), u2 = Math.random();
        out.push(mu + Math.sqrt(-2 * Math.log(u1)) * Math.cos(2 * Math.PI * u2) * sigma);
      }
      return out;
    }

    const DATASETS = {
      patient: {
        title: '三组患者血压测量值 (mmHg)',
        groups: [
          { name: '对照组', data: randn(120, 8, 60).map((v, i) => ({ value: v, id: 'C' + i })) },
          { name: '用药A组', data: randn(115, 7, 60).map((v, i) => ({ value: v, id: 'A' + i })) },
          { name: '用药B组', data: randn(118, 9, 60).map((v, i) => ({ value: v, id: 'B' + i })) },
        ]
      },
      product: {
        title: '四款手机用户评分 (1-5 星)',
        groups: [
          { name: '产品X', data: randn(4.2, 0.4, 80).map(v => Math.min(5, Math.max(1, v))).map((v, i) => ({ value: v, id: 'X' + i })) },
          { name: '产品Y', data: randn(3.8, 0.5, 80).map(v => Math.min(5, Math.max(1, v))).map((v, i) => ({ value: v, id: 'Y' + i })) },
          { name: '产品Z', data: randn(4.5, 0.3, 80).map(v => Math.min(5, Math.max(1, v))).map((v, i) => ({ value: v, id: 'Z' + i })) },
          { name: '产品W', data: randn(3.5, 0.6, 80).map(v => Math.min(5, Math.max(1, v))).map((v, i) => ({ value: v, id: 'W' + i })) },
        ]
      },
      city: {
        title: '主要城市 PM2.5 (μg/m³)',
        groups: [
          { name: '北京', data: randn(55, 20, 50).map((v, i) => ({ value: v, id: 'BJ' + i })) },
          { name: '上海', data: randn(42, 15, 50).map((v, i) => ({ value: v, id: 'SH' + i })) },
          { name: '广州', data: randn(38, 14, 50).map((v, i) => ({ value: v, id: 'GZ' + i })) },
        ]
      }
    };

    // 蜂群防重叠算法:简单贪心
    function beeswarm(values, width, radius) {
      // 按 value 排序,然后逐个放置,寻找最小冲突 y
      const sorted = values.map(v => ({ ...v })).sort((a, b) => a.value - b.value);
      const placed = [];
      sorted.forEach(d => {
        // 候选 y 从 0 开始递增寻找无冲突位置
        let y = 0, ok = false;
        while (!ok) {
          ok = true;
          for (const p of placed) {
            if (Math.abs(p.value - d.value) * width < radius * 2 + 1 &&
                Math.abs(p._y - y) < radius * 2 + 1) {
              ok = false; y += radius * 2 + 0.5; break;
            }
          }
        }
        d._y = y;
        placed.push(d);
      });
      return placed;
    }

    let curSet = 'patient', curRadius = 6;

    function render() {
      const d = DATASETS[curSet];
      svg.selectAll('*').remove();
      const W = svg.node().clientWidth;
      const H = Math.max(540, svg.node().clientHeight);
      const m = { top: 40, right: 40, bottom: 50, left: 60 };

      const allValues = d.groups.flatMap(g => g.data);
      const x = d3.scaleLinear()
        .domain(d3.extent(allValues, v => v.value)).nice()
        .range([m.left, W - m.right]);

      // 每组一个泳道
      const n = d.groups.length;
      const laneH = (H - m.top - m.bottom) / n;
      const xRange = W - m.left - m.right;

      const g = svg.append('g');

      d.groups.forEach((grp, gi) => {
        const laneTop = m.top + gi * laneH;
        const laneMid = laneTop + laneH / 2;

        // 泳道背景
        g.append('rect')
          .attr('x', m.left).attr('y', laneTop + 4)
          .attr('width', xRange).attr('height', laneH - 8)
          .attr('fill', gi % 2 ? 'rgba(26,33,56,0.4)' : 'transparent');

        // 中线
        g.append('line').attr('x1', m.left).attr('x2', W - m.right)
          .attr('y1', laneMid).attr('y2', laneMid)
          .attr('stroke', '#d8d4c8').attr('stroke-dasharray', '2 4');

        // 组标签
        g.append('text').attr('x', m.left - 12).attr('y', laneMid)
          .attr('text-anchor', 'end').attr('dy', '0.32em')
          .style('fill', palette[gi]).style('font-size', '13px').style('font-weight', 600)
          .text(grp.name);

        // 蜂群算法
        const swarmed = beeswarm(grp.data, 1, curRadius);

        // 画点
        g.append('g').selectAll('circle')
          .data(swarmed)
          .join('circle')
          .attr('cx', dd => x(dd.value))
          .attr('cy', dd => laneMid - dd._y / 8 * (laneH / 2 - 10))
          .attr('r', curRadius)
          .attr('fill', palette[gi]).attr('fill-opacity', 0.7)
          .attr('stroke', '#faf9f6').attr('stroke-width', 1)
          .style('cursor', 'pointer')
          .on('mouseenter', function(e, dd) {
            d3.select(this).attr('fill-opacity', 1).attr('r', curRadius + 2);
            tip.style('opacity', 1).html(`<b>${grp.name}</b> ${dd.id}<br/>值: <b style="color:#9c4221">${dd.value.toFixed(2)}</b>`);
          })
          .on('mousemove', e => tip.style('left', (e.clientX + 14) + 'px').style('top', (e.clientY - 30) + 'px'))
          .on('mouseleave', function() {
            d3.select(this).attr('fill-opacity', 0.7).attr('r', curRadius);
            tip.style('opacity', 0);
          });
      });

      // X 轴
      g.append('g').attr('transform', `translate(0,${H - m.bottom})`)
        .call(d3.axisBottom(x).ticks(8))
        .call(ax => ax.select('.domain').remove())
        .selectAll('text').style('fill', '#6b6b6b');
      svg.selectAll('.tick line').attr('stroke', '#f3f1ea');

      // 标题
      svg.append('text').attr('x', W / 2).attr('y', 24).attr('text-anchor', 'middle')
        .style('fill', '#6b6b6b').style('font-size', '13px').text(d.title);

      // 图例
      const legend = document.getElementById('legend');
      legend.innerHTML = '';
      d.groups.forEach((grp, i) => {
        legend.innerHTML += `<span><i style="background:${palette[i]}"></i>${grp.name} (n=${grp.data.length})</span>`;
      });
    }

    render();
    document.querySelectorAll('.controls button[data-set]').forEach(btn => {
      btn.onclick = () => {
        document.querySelectorAll('.controls button[data-set]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active'); curSet = btn.dataset.set; render();
      };
    });
    document.getElementById('psize').oninput = function() { curRadius = +this.value; render(); };
    window.addEventListener('resize', render);
  </script>
</body>
</html>
