<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>31 · 瀑布图 Waterfall Chart</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono&family=Noto+Serif+SC:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --paper: #faf9f6; --ink: #1a1a1a; --ink-2: #3d3d3d; --ink-3: #6b6b6b;
      --rule: #d8d4c8; --accent: #2c5282; --moss: #4a6741; --rust: #9c4221;
      --serif: "Source Serif 4", "Noto Serif SC", Georgia, serif;
      --sans: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    body { background: var(--paper); color: var(--ink); font-family: var(--serif); padding: 24px 32px; min-height: 100vh; }
    h1 { font-family: var(--serif); font-size: 26px; font-weight: 500; }
    h1 em { font-style: italic; color: var(--accent); font-weight: 400; }
    .sub { font-family: var(--sans); color: var(--ink-3); font-size: 13px; margin: 6px 0 18px; line-height: 1.5; }
    #chart { width: 100%; height: calc(100vh - 160px); min-height: 500px; border: 1px solid var(--rule); border-radius: 2px; background: var(--paper); }
    .controls { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
    .controls button { font-family: var(--sans); background: var(--paper); border: 1px solid var(--rule); color: var(--ink-2); padding: 6px 14px; border-radius: 2px; cursor: pointer; font-size: 12px; transition: all .15s; }
    .controls button:hover { color: var(--accent); border-color: var(--accent); }
    .controls button.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }
    .hint { font-family: var(--sans); font-size: 12px; color: var(--ink-3); margin-top: 10px; line-height: 1.6; }
    @media (max-width: 768px) {
      body { padding: 16px 14px; } h1 { font-size: 22px; } .sub { font-size: 12px; margin-bottom: 12px; }
      .controls { gap: 4px; } .controls button { padding: 5px 10px; font-size: 11px; }
      #chart { height: calc(100vh - 180px) !important; min-height: 380px !important; }
      .hint { font-size: 11px; }
    }
    @media (max-width: 420px) { body { padding: 12px 10px; } h1 { font-size: 20px; } #chart { height: calc(100vh - 160px) !important; min-height: 340px !important; } }
  </style>
</head>
<body><!-- BACK_BTN -->
  <a href="../index.html#31-waterfall" style="
    position:fixed; top:16px; right:16px; z-index:100;
    font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;
    background:#1a1a1a; color:#faf9f6; text-decoration:none;
    padding:8px 16px; border-radius:2px; font-size:12px; font-weight:500;
    letter-spacing:0.04em; box-shadow:0 2px 12px rgba(0,0,0,0.15);
    display:inline-flex; align-items:center; gap:6px;
    transition:background .15s, transform .15s;
  " onmouseover="this.style.background='#2c5282';this.style.transform='translateY(-1px)'"
    onmouseout="this.style.background='#1a1a1a';this.style.transform='translateY(0)'">
    ← 返回介绍
  </a>
  <h1>瀑布图 <em>Waterfall Chart</em></h1>
  <div class="sub">累计增减变化 · 绿涨红降 · 看清"从哪到哪、谁贡献"</div>
  <div class="controls">
    <button class="active" data-set="profit">💰 利润构成</button>
    <button data-set="budget">📊 预算变动</button>
    <button data-set="inventory">📦 库存变化</button>
  </div>
  <div id="chart"></div>
  <div class="hint">解读:绿柱=增加,红柱=减少,蓝柱=起始/总计,虚线连接累计值。</div>

  <script>
    const chart = echarts.init(document.getElementById('chart'));
    // 全屏打开时容器高度(100vh)可能在 init 时未就绪,延迟一次 resize 兜底
    requestAnimationFrame(() => chart.resize());
    window.addEventListener('load', () => chart.resize());

    const DATASETS = {
      profit: {
        title: '年度利润构成瀑布 (万元)',
        items: [
          { name: '营业收入', value: 1000, type: 'start' },
          { name: '主营业务成本', value: -420, type: 'decrease' },
          { name: '销售费用', value: -150, type: 'decrease' },
          { name: '管理费用', value: -100, type: 'decrease' },
          { name: '其他收益', value: 80, type: 'increase' },
          { name: '所得税', value: -90, type: 'decrease' },
          { name: '净利润', value: 320, type: 'end' },
        ]
      },
      budget: {
        title: '项目预算变动瀑布 (万元)',
        items: [
          { name: '初始预算', value: 500, type: 'start' },
          { name: '追加投资', value: 200, type: 'increase' },
          { name: '削减人力', value: -80, type: 'decrease' },
          { name: '节省材料', value: -50, type: 'decrease' },
          { name: '紧急拨款', value: 120, type: 'increase' },
          { name: '最终预算', value: 690, type: 'end' },
        ]
      },
      inventory: {
        title: '仓库库存月度变化 (件)',
        items: [
          { name: '期初库存', value: 2000, type: 'start' },
          { name: '生产入库', value: 800, type: 'increase' },
          { name: '销售出库', value: -1200, type: 'decrease' },
          { name: '退货入库', value: 60, type: 'increase' },
          { name: '损耗报损', value: -40, type: 'decrease' },
          { name: '期末库存', value: 1620, type: 'end' },
        ]
      }
    };

    function colorOf(type) {
      if (type === 'start' || type === 'end') return '#2c5282';
      if (type === 'increase') return '#4a6741';
      return '#9c4221';
    }

    function render(key) {
      const d = DATASETS[key];
      // 瀑布图技巧:用 placeholder(透明)+ value 双 series 堆叠
      let cum = 0;
      const placeholders = [], values = [];
      d.items.forEach(it => {
        if (it.type === 'start' || it.type === 'end') {
          placeholders.push(0);
          values.push({ value: it.value, itemStyle: { color: colorOf(it.type) }, name: it.name });
          cum = it.value;
        } else if (it.value >= 0) {
          placeholders.push(cum);
          values.push({ value: it.value, itemStyle: { color: colorOf(it.type) }, name: it.name });
          cum += it.value;
        } else {
          cum += it.value;
          placeholders.push(cum);
          values.push({ value: -it.value, itemStyle: { color: colorOf(it.type) }, name: it.name });
        }
      });

      chart.setOption({
        backgroundColor: 'transparent',
        title: { text: d.title, left: 'center', textStyle: { fontFamily: 'Source Serif 4, serif', fontSize: 14, color: '#6b6b6b', fontWeight: 400 } },
        tooltip: {
          formatter: params => {
            const p = params.find(pp => pp.seriesName === '数值');
            if (!p) return '';
            const item = d.items[p.dataIndex];
            const sign = item.value >= 0 ? '+' : '';
            return `<b>${item.name}</b><br/>${sign}${item.value}`;
          }
        },
        grid: { left: 60, right: 30, top: 70, bottom: 60 },
        xAxis: { type: 'category', data: d.items.map(it => it.name), axisLabel: { color: '#3d3d3d', fontFamily: 'sans-serif', rotate: 15, fontSize: 11 }, axisLine: { lineStyle: { color: '#d8d4c8' } } },
        yAxis: { type: 'value', splitLine: { lineStyle: { color: '#e8e4d8' } }, axisLabel: { color: '#6b6b6b', fontFamily: 'sans-serif' }, axisLine: { lineStyle: { color: '#d8d4c8' } } },
        series: [
          {
            name: '占位', type: 'bar', stack: 'wf',
            itemStyle: { color: 'transparent' },
            data: placeholders,
            silent: true
          },
          {
            name: '数值', type: 'bar', stack: 'wf',
            data: values,
            label: {
              show: true, position: 'top',
              formatter: p => {
                const item = d.items[p.dataIndex];
                const sign = item.value >= 0 ? '+' : '';
                return sign + item.value;
              },
              color: '#1a1a1a', fontFamily: 'sans-serif', fontSize: 11, fontWeight: 600
            },
            barWidth: '55%',
            animationDuration: 1200
          }
        ]
      }, true);
    }

    render('profit');
    document.querySelectorAll('.controls button').forEach(btn => {
      btn.onclick = () => {
        document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active'); render(btn.dataset.set);
      };
    });
    window.addEventListener('resize', () => chart.resize());
  </script>
  <script src="../assets/fullscreen-tools.js"></script>
</body>
</html>
