<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>14 · 平行坐标图 Parallel Coordinates</title>
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono&family=Noto+Serif+SC:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --paper: #faf9f6; --paper-soft: #f3f1ea; --paper-card: #ffffff;
      --ink: #1a1a1a; --ink-2: #3d3d3d; --ink-3: #6b6b6b;
      --rule: #d8d4c8; --rule-soft: #e8e4d8; --accent: #2c5282; --accent-soft: #ebf0f7;
      --rust: #9c4221; --ochre: #975a16; --moss: #4a6741;
      --serif: "Source Serif 4", "Noto Serif SC", Georgia, serif;
      --sans: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      --mono: "JetBrains Mono", Consolas, monospace;
    }
    body { background: var(--paper); color: var(--ink);
      font-family: var(--serif); padding: 24px 32px; min-height: 100vh; }
    h1 { font-family: var(--serif); font-size: 26px; font-weight: 500; letter-spacing: -0.01em; }
    h1 em { font-style: italic; color: var(--accent); font-weight: 400; }
    .sub { font-family: var(--sans); color: var(--ink-3); font-size: 13px; margin: 6px 0 18px; line-height: 1.5; }
    .hint, .info, .mapping { font-family: var(--sans); font-size: 12px; color: var(--ink-3); margin-top: 10px; line-height: 1.6; }
    .hint code, .mapping code { font-family: var(--mono); background: var(--paper-soft); padding: 1px 6px; border-radius: 2px; color: var(--accent); font-size: 11px; }
    #chart, #cloud, #cy { border: 1px solid var(--rule); border-radius: 2px; background: var(--paper); }
    svg { display: block; width: 100%; }
    .controls { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; align-items: center; }
    .controls button, .controls select {
      font-family: var(--sans); background: var(--paper); border: 1px solid var(--rule); color: var(--ink-2);
      padding: 6px 14px; border-radius: 2px; cursor: pointer; font-size: 12px; transition: all .15s;
    }
    .controls button:hover, .controls select:hover { color: var(--accent); border-color: var(--accent); }
    .controls button.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }
    .controls label { color: var(--ink-3); font-family: var(--sans); font-size: 12px; }
    .legend { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 12px; font-family: var(--sans); font-size: 11px; color: var(--ink-2); }
    .legend span { display: inline-flex; align-items: center; gap: 6px; cursor: pointer; }
    .legend i { width: 12px; height: 12px; display: inline-block; }
    .legend .dot { border-radius: 50%; }
    .tip { position: fixed; pointer-events: none; opacity: 0;
      background: #fff; border: 1px solid var(--ink); padding: 10px 14px; border-radius: 2px;
      font-family: var(--sans); font-size: 12px; max-width: 260px; line-height: 1.6;
      transition: opacity .12s; box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
    .node-label, .face-label { font-family: var(--sans); font-size: 11px; fill: var(--ink); }
    .ridge-label { font-family: var(--sans); font-size: 12px; font-weight: 600; }
  
    /* ===== 移动端响应式 ===== */
    @media (max-width: 768px) {
      body { padding: 16px 14px; }
      h1 { font-size: 22px; }
      .sub { font-size: 12px; margin-bottom: 12px; }
      .controls { gap: 4px; }
      .controls button, .controls select { padding: 5px 10px; font-size: 11px; }
      .controls label { font-size: 11px; }
      #chart, svg, #cloud, #cy {
        height: 60vh !important;
        min-height: 360px !important;
      }
      .hint, .info, .mapping, .legend { font-size: 11px; }
      .legend { gap: 10px; }
      .node-label, .face-label, .ridge-label { font-size: 10px; }
    }
    @media (max-width: 420px) {
      body { padding: 12px 10px; }
      h1 { font-size: 20px; }
      #chart, svg, #cloud, #cy { height: 55vh !important; min-height: 320px !important; }
    }
  </style>
</head>
<body><!-- BACK_BTN -->
  <a href="../index.html#14-parallel" style="
    position:fixed; top:16px; right:16px; z-index:100;
    font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;
    background:#1a1a1a; color:#faf9f6; text-decoration:none;
    padding:8px 16px; border-radius:2px; font-size:12px; font-weight:500;
    letter-spacing:0.04em; box-shadow:0 2px 12px rgba(0,0,0,0.15);
    display:inline-flex; align-items:center; gap:6px;
    transition:background .15s, transform .15s;
  " onmouseover="this.style.background='#2c5282';this.style.transform='translateY(-1px)'"
    onmouseout="this.style.background='#1a1a1a';this.style.transform='translateY(0)'">
    ← 返回介绍
  </a>
  <h1>平行坐标图 <em>Parallel Coordinates</em></h1>
  <div class="sub">多维数据 · N 条平行轴 · 每条数据一条折线 · 轴上拖选过滤</div>
  <div class="controls">
    <button class="active" data-set="iris">🌸 鸢尾花(4维)</button>
    <button data-set="car">🚗 汽车参数(5维)</button>
    <button data-set="wine">🍷 红酒指标(6维)</button>
  </div>
  <div id="chart"></div>
  <div class="legend" id="legend"></div>
  <div class="hint">💡 在任意纵轴上拖动可框选区间,实时过滤折线;可多轴组合过滤。</div>

  <script>
    const chart = echarts.init(document.getElementById('chart'));
    const palette = ['#2c5282', '#9c4221', '#975a16', '#4a6741', '#6b5d8a', '#2d7a7a', '#8a5a2b', '#3d5a80'];

    // 生成单个正态分布随机数(原 randn 需 n 参数返回数组,调用处未传 n 导致 NaN,此处修正)
    function randn(mu, sigma) {
      const u1 = Math.max(1e-12, Math.random()), u2 = Math.random();
      return mu + Math.sqrt(-2 * Math.log(u1)) * Math.cos(2 * Math.PI * u2) * sigma;
    }

    const DATASETS = {
      iris: {
        title: '鸢尾花数据集(花萼/花瓣 长宽 cm)',
        dims: ['花萼长', '花萼宽', '花瓣长', '花瓣宽'],
        groups: [
          { name: 'setosa', data: Array.from({length: 40}, () => [5+randn(0,0.3), 3.4+randn(0,0.3), 1.5+randn(0,0.2), 0.2+randn(0,0.1)]) },
          { name: 'versicolor', data: Array.from({length: 40}, () => [5.9+randn(0,0.4), 2.8+randn(0,0.3), 4.3+randn(0,0.4), 1.3+randn(0,0.2)]) },
          { name: 'virginica', data: Array.from({length: 40}, () => [6.5+randn(0,0.5), 3+randn(0,0.3), 5.5+randn(0,0.5), 2+randn(0,0.3)]) },
        ]
      },
      car: {
        title: '汽车参数(排量/马力/重量/油耗/价格)',
        dims: ['排量(L)', '马力(PS)', '重量(kg)', '油耗(L/100km)', '价格(万)'],
        groups: [
          { name: '小型车', data: Array.from({length: 30}, () => [1.5+randn(0,0.2), 110+randn(0,15), 1200+randn(0,80), 6+randn(0,0.8), 10+randn(0,3)]) },
          { name: 'SUV', data: Array.from({length: 30}, () => [2.5+randn(0,0.4), 200+randn(0,25), 1800+randn(0,120), 9+randn(0,1.2), 25+randn(0,8)]) },
          { name: '跑车', data: Array.from({length: 30}, () => [3.5+randn(0,0.6), 350+randn(0,40), 1500+randn(0,100), 12+randn(0,1.5), 80+randn(0,30)]) },
        ]
      },
      wine: {
        title: '红酒化学指标(多维度评分)',
        dims: ['酒精%', '苹果酸', '灰分', '镁', '酚类', '色度'],
        groups: [
          { name: 'A 类', data: Array.from({length: 40}, () => [14+randn(0,0.4), 1.5+randn(0,0.3), 2.5+randn(0,0.2), 100+randn(0,12), 2.5+randn(0,0.4), 5+randn(0,1)]) },
          { name: 'B 类', data: Array.from({length: 40}, () => [12+randn(0,0.5), 2.5+randn(0,0.4), 2.2+randn(0,0.2), 90+randn(0,10), 1.8+randn(0,0.3), 3+randn(0,0.8)]) },
          { name: 'C 类', data: Array.from({length: 40}, () => [13+randn(0,0.4), 2+randn(0,0.3), 2.4+randn(0,0.2), 95+randn(0,11), 2+randn(0,0.35), 7+randn(0,1.2)]) },
        ]
      }
    };

    function render(key) {
      const d = DATASETS[key];
      // 合并所有数据,记录分组
      const allData = [];
      d.groups.forEach((grp, gi) => {
        grp.data.forEach(row => allData.push([...row, gi]));
      });

      // 平行坐标轴定义
      const parallelAxis = d.dims.map((name, i) => ({ dim: i, name, nameLocation: 'start', nameTextStyle: { color: '#6b6b6b', fontSize: 12 } }));

      // 每组一条 series
      const series = d.groups.map((grp, gi) => ({
        name: grp.name,
        type: 'parallel',
        data: grp.data,
        lineStyle: { color: palette[gi], width: 1, opacity: 0.5 },
        emphasis: { lineStyle: { width: 2.5, opacity: 1 } },
        smooth: true,
        progressive: 200
      }));

      chart.setOption({
        backgroundColor: 'transparent',
        title: { text: d.title, left: 'center', textStyle: { fontSize: 14, color: '#6b6b6b' } },
        tooltip: { trigger: 'item' },
        parallelAxis,
        parallel: {
          left: 60, right: 60, top: 60, bottom: 40,
          parallelAxisDefault: {
            axisLine: { lineStyle: { color: '#d8d4c8' } },
            axisTick: { lineStyle: { color: '#d8d4c8' } },
            axisLabel: { color: '#6b6b6b' },
            nameTextStyle: { color: '#6b6b6b' }
          }
        },
        series
      }, true);

      // 图例
      const legend = document.getElementById('legend');
      legend.innerHTML = '';
      d.groups.forEach((g, i) => {
        legend.innerHTML += `<span data-idx="${i}"><i style="background:${palette[i]}"></i>${g.name} (${g.data.length})</span>`;
      });
      legend.querySelectorAll('span').forEach(sp => {
        sp.onclick = () => {
          const idx = +sp.dataset.idx;
          chart.dispatchAction({ type: 'highlight', seriesIndex: idx });
        };
      });
    }

    render('iris');
    document.querySelectorAll('.controls button').forEach(btn => {
      btn.onclick = () => {
        document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active'); render(btn.dataset.set);
      };
    });
    window.addEventListener('resize', () => chart.resize());
  </script>
</body>
</html>
