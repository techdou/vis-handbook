<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>05 · 演化时间线 Evolution Timeline</title>
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono&family=Noto+Serif+SC:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --paper: #faf9f6; --paper-soft: #f3f1ea; --paper-card: #ffffff;
      --ink: #1a1a1a; --ink-2: #3d3d3d; --ink-3: #6b6b6b;
      --rule: #d8d4c8; --rule-soft: #e8e4d8; --accent: #2c5282; --accent-soft: #ebf0f7;
      --rust: #9c4221; --ochre: #975a16; --moss: #4a6741;
      --serif: "Source Serif 4", "Noto Serif SC", Georgia, serif;
      --sans: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      --mono: "JetBrains Mono", Consolas, monospace;
    }
    body { background: var(--paper); color: var(--ink);
      font-family: var(--serif); padding: 24px 32px; min-height: 100vh; }
    h1 { font-family: var(--serif); font-size: 26px; font-weight: 500; letter-spacing: -0.01em; }
    h1 em { font-style: italic; color: var(--accent); font-weight: 400; }
    .sub { font-family: var(--sans); color: var(--ink-3); font-size: 13px; margin: 6px 0 18px; line-height: 1.5; }
    .hint, .info, .mapping { font-family: var(--sans); font-size: 12px; color: var(--ink-3); margin-top: 10px; line-height: 1.6; }
    .hint code, .mapping code { font-family: var(--mono); background: var(--paper-soft); padding: 1px 6px; border-radius: 2px; color: var(--accent); font-size: 11px; }
    #chart, #cloud, #cy { border: 1px solid var(--rule); border-radius: 2px; background: var(--paper); }
    svg { display: block; width: 100%; }
    .controls { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; align-items: center; }
    .controls button, .controls select {
      font-family: var(--sans); background: var(--paper); border: 1px solid var(--rule); color: var(--ink-2);
      padding: 6px 14px; border-radius: 2px; cursor: pointer; font-size: 12px; transition: all .15s;
    }
    .controls button:hover, .controls select:hover { color: var(--accent); border-color: var(--accent); }
    .controls button.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }
    .controls label { color: var(--ink-3); font-family: var(--sans); font-size: 12px; }
    .legend { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 12px; font-family: var(--sans); font-size: 11px; color: var(--ink-2); }
    .legend span { display: inline-flex; align-items: center; gap: 6px; cursor: pointer; }
    .legend i { width: 12px; height: 12px; display: inline-block; }
    .legend .dot { border-radius: 50%; }
    .tip { position: fixed; pointer-events: none; opacity: 0;
      background: #fff; border: 1px solid var(--ink); padding: 10px 14px; border-radius: 2px;
      font-family: var(--sans); font-size: 12px; max-width: 260px; line-height: 1.6;
      transition: opacity .12s; box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
    .node-label, .face-label { font-family: var(--sans); font-size: 11px; fill: var(--ink); }
    .ridge-label { font-family: var(--sans); font-size: 12px; font-weight: 600; }
  
    /* ===== 移动端响应式 ===== */
    @media (max-width: 768px) {
      body { padding: 16px 14px; }
      h1 { font-size: 22px; }
      .sub { font-size: 12px; margin-bottom: 12px; }
      .controls { gap: 4px; }
      .controls button, .controls select { padding: 5px 10px; font-size: 11px; }
      .controls label { font-size: 11px; }
      #chart, svg, #cloud, #cy {
        height: 60vh !important;
        min-height: 360px !important;
      }
      .hint, .info, .mapping, .legend { font-size: 11px; }
      .legend { gap: 10px; }
      .node-label, .face-label, .ridge-label { font-size: 10px; }
    }
    @media (max-width: 420px) {
      body { padding: 12px 10px; }
      h1 { font-size: 20px; }
      #chart, svg, #cloud, #cy { height: 55vh !important; min-height: 320px !important; }
    }
  </style>
</head>
<body><!-- BACK_BTN -->
  <a href="../index.html#05-evolution" style="
    position:fixed; top:16px; right:16px; z-index:100;
    font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;
    background:#1a1a1a; color:#faf9f6; text-decoration:none;
    padding:8px 16px; border-radius:2px; font-size:12px; font-weight:500;
    letter-spacing:0.04em; box-shadow:0 2px 12px rgba(0,0,0,0.15);
    display:inline-flex; align-items:center; gap:6px;
    transition:background .15s, transform .15s;
  " onmouseover="this.style.background='#2c5282';this.style.transform='translateY(-1px)'"
    onmouseout="this.style.background='#1a1a1a';this.style.transform='translateY(0)'">
    ← 返回介绍
  </a>
  <h1>演化时间线 <em>Evolution Timeline</em></h1>
  <div class="sub">沿时间轴叙事 · 多轨道布局 · 滚轮缩放 · 点击节点看详情</div>
  <div class="controls">
    <button class="active" data-set="ai">🤖 AI 发展史</button>
    <button data-set="web">🌐 Web 技术演进</button>
    <button id="playBtn">▶ 自动播放</button>
    <span style="color:#6b6b6b;font-size:12px;margin-left:auto">提示:滚轮缩放,拖动平移</span>
  </div>
  <svg id="chart"></svg>
  <div class="tip" id="tip"></div>

  <script>
    const svg = d3.select('#chart');
    const margin = { top: 40, right: 40, bottom: 50, left: 110 };

    const DATASETS = {
      ai: {
        title: 'AI / 深度学习关键里程碑',
        tracks: ['理论基础', '神经网络', '大模型', '应用突破'],
        events: [
          { date: '1986-01-01', track: '理论基础', title: 'BP 反向传播', desc: 'Rumelhart 等人重新发现反向传播算法,神经网络训练成为可能', size: 30 },
          { date: '1997-01-01', track: '神经网络', title: 'LSTM', desc: 'Hochreiter 提出 LSTM,解决长序列依赖', size: 25 },
          { date: '2006-01-01', track: '神经网络', title: '深度学习', desc: 'Hinton 提出深度信念网络,开启深度学习时代', size: 28 },
          { date: '2012-09-01', track: '应用突破', title: 'AlexNet', desc: 'ImageNet 竞赛大幅领先,深度学习引爆', size: 35 },
          { date: '2014-01-01', track: '神经网络', title: 'GAN', desc: 'Goodfellow 提出生成对抗网络', size: 30 },
          { date: '2017-06-01', track: '大模型', title: 'Transformer', desc: 'Google 发布 Attention Is All You Need', size: 40 },
          { date: '2018-06-01', track: '大模型', title: 'BERT', desc: '预训练语言模型范式确立', size: 35 },
          { date: '2020-05-01', track: '大模型', title: 'GPT-3', desc: '1750 亿参数,涌现能力出现', size: 42 },
          { date: '2022-11-01', track: '应用突破', title: 'ChatGPT', desc: '对话式 AI 爆发,引发全球关注', size: 45 },
          { date: '2023-03-01', track: '大模型', title: 'GPT-4', desc: '多模态能力,接近人类水平', size: 42 },
          { date: '2024-05-01', track: '应用突破', title: 'GPT-4o', desc: '实时多模态交互', size: 38 },
        ]
      },
      web: {
        title: 'Web 前端技术演进',
        tracks: ['框架', '构建工具', '语言', '运行时'],
        events: [
          { date: '2010-10-01', track: '框架', title: 'Backbone.js', desc: 'MVC 模式引入前端', size: 20 },
          { date: '2013-05-01', track: '框架', title: 'React', desc: 'Facebook 发布组件化框架', size: 35 },
          { date: '2014-02-01', track: '框架', title: 'Vue.js', desc: '尤雨溪发布渐进式框架', size: 33 },
          { date: '2015-09-01', track: '语言', title: 'TypeScript 1.0', desc: 'JS 静态类型时代开启', size: 28 },
          { date: '2016-10-01', track: '框架', title: 'Angular 2', desc: 'Google 重写框架', size: 25 },
          { date: '2017-10-01', track: '构建工具', title: 'webpack 3', desc: '模块打包成为标配', size: 22 },
          { date: '2020-09-01', track: '语言', title: 'TypeScript 4', desc: '类型系统成熟', size: 28 },
          { date: '2020-10-01', track: '构建工具', title: 'Vite', desc: '基于 ESM 的极速构建', size: 32 },
          { date: '2022-02-01', track: '框架', title: 'Vue 3', desc: 'Composition API + 性能跃升', size: 30 },
          { date: '2023-05-01', track: '运行时', title: 'Bun 1.0', desc: '全能 JS 运行时', size: 25 },
          { date: '2024-05-01', track: '框架', title: 'React 19', desc: 'Server Components 稳定', size: 32 },
        ]
      }
    };

    const trackColors = { '理论基础': '#2c5282', '神经网络': '#9c4221', '大模型': '#975a16', '应用突破': '#975a16',
                          '框架': '#2c5282', '构建工具': '#9c4221', '语言': '#975a16', '运行时': '#4a6741' };

    let zoomBehavior, currentData;

    function render(key) {
      const d = DATASETS[key];
      currentData = d;
      svg.selectAll('*').remove();
      const W = svg.node().clientWidth;
      const H = Math.max(500, svg.node().clientHeight);

      const parseTime = d3.timeParse('%Y-%m-%d');
      const events = d.events.map(e => ({ ...e, date: parseTime(e.date) }));

      const x = d3.scaleTime()
        .domain(d3.extent(events, e => e.date))
        .nice()
        .range([margin.left, W - margin.right]);

      const trackH = (H - margin.top - margin.bottom) / d.tracks.length;
      const yTrack = (trackName) => margin.top + d.tracks.indexOf(trackName) * trackH + trackH / 2;

      // 主组(支持缩放)
      const g = svg.append('g');

      // 轨道背景 + 标签
      d.tracks.forEach((t, i) => {
        const yc = margin.top + i * trackH;
        g.append('rect')
          .attr('x', margin.left).attr('y', yc)
          .attr('width', W - margin.left - margin.right).attr('height', trackH)
          .attr('fill', i % 2 ? 'rgba(26,33,56,0.4)' : 'transparent');
        g.append('text')
          .attr('x', margin.left - 16).attr('y', yc + trackH / 2)
          .attr('text-anchor', 'end').attr('dy', '0.32em')
          .style('fill', trackColors[t] || '#6b6b6b')
          .style('font-size', '13px').style('font-weight', 600)
          .text(t);
        // 轨道中线
        g.append('line')
          .attr('x1', margin.left).attr('x2', W - margin.right)
          .attr('y1', yc + trackH / 2).attr('y2', yc + trackH / 2)
          .attr('stroke', '#d8d4c8').attr('stroke-dasharray', '2 4');
      });

      // 事件节点
      const nodes = g.selectAll('.event')
        .data(events)
        .join('g')
        .attr('class', 'event')
        .attr('transform', e => `translate(${x(e.date)},${yTrack(e.track)})`)
        .style('cursor', 'pointer');

      // 节点光晕
      nodes.append('circle')
        .attr('r', e => e.size / 8 + 2)
        .attr('fill', e => trackColors[e.track])
        .attr('opacity', 0.25);

      // 节点本体
      nodes.append('circle')
        .attr('r', e => e.size / 8)
        .attr('fill', e => trackColors[e.track])
        .attr('stroke', '#faf9f6').attr('stroke-width', 2)
        .style('transition', 'r .2s');

      // 事件标题
      nodes.append('text')
        .attr('y', e => -e.size / 8 - 8)
        .attr('text-anchor', 'middle')
        .style('fill', '#1a1a1a').style('font-size', '11px').style('font-weight', 600)
        .text(e => e.title);

      // 日期
      nodes.append('text')
        .attr('y', e => e.size / 8 + 14)
        .attr('text-anchor', 'middle')
        .style('fill', '#6b6b6b').style('font-size', '10px')
        .text(e => d3.timeFormat('%Y')(e.date));

      // hover 高亮 + tooltip
      const tip = d3.select('#tip');
      nodes.on('mouseenter', function(e, d) {
        d3.select(this).select('circle:nth-child(2)').transition().duration(150).attr('r', d.size / 8 + 4);
        tip.style('opacity', 1).html(
          `<b style="color:${trackColors[d.track]}">${d.title}</b> · ${d3.timeFormat('%Y-%m')(d.date)}<br/>${d.desc}`
        );
      })
      .on('mousemove', function(e) {
        tip.style('left', (e.clientX + 14) + 'px').style('top', (e.clientY - 50) + 'px');
      })
      .on('mouseleave', function(e, d) {
        d3.select(this).select('circle:nth-child(2)').transition().duration(150).attr('r', d.size / 8);
        tip.style('opacity', 0);
      });

      // 时间轴
      const xAxis = d3.axisBottom(x).ticks(8).tickFormat(d3.timeFormat('%Y'));
      const xAxisG = svg.append('g')
        .attr('transform', `translate(0,${H - margin.bottom})`)
        .call(xAxis);
      xAxisG.select('.domain').attr('stroke', '#d8d4c8');
      xAxisG.selectAll('text').style('fill', '#6b6b6b');

      // 缩放行为
      zoomBehavior = d3.zoom().scaleExtent([0.5, 8]).on('zoom', (ev) => {
        const nx = ev.transform.rescaleX(x);
        g.selectAll('.event').attr('transform', e => `translate(${nx(e.date)},${yTrack(e.track)})`);
        xAxisG.call(xAxis.scale(nx));
      });
      svg.call(zoomBehavior);
    }

    let curSet = 'ai';
    render(curSet);
    document.querySelectorAll('.controls button[data-set]').forEach(btn => {
      btn.onclick = () => {
        document.querySelectorAll('.controls button[data-set]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        curSet = btn.dataset.set;
        render(curSet);
      };
    });

    // 自动播放:逐个点亮节点
    let playing = false, timer;
    document.getElementById('playBtn').onclick = function() {
      if (playing) { playing = false; clearTimeout(timer); this.textContent = '▶ 自动播放'; return; }
      playing = true; this.textContent = '⏸ 暂停';
      const events = svg.selectAll('.event');
      let i = 0;
      const step = () => {
        if (!playing || i >= events.size()) {
          playing = false; document.getElementById('playBtn').textContent = '▶ 自动播放';
          return;
        }
        const n = d3.select(events.nodes()[i]);
        n.select('circle:nth-child(2)').transition().duration(400)
          .attr('r', _ => n.datum().size / 8 + 8)
          .transition().duration(300)
          .attr('r', n.datum().size / 8);
        i++;
        timer = setTimeout(step, 800);
      };
      step();
    };

    window.addEventListener('resize', () => render(curSet));
  </script>
</body>
</html>
